<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MYNTRA SALES & PLANNING</title>

  <!-- CORE CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- MODULE CSS -->
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/sales.css" />
  <link rel="stylesheet" href="css/sjit-planning.css" />
  <link rel="stylesheet" href="css/sor-planning.css" />
  <link rel="stylesheet" href="css/export-center.css" />
  <link rel="stylesheet" href="css/style-xray.css" />
  <link rel="stylesheet" href="css/progress.css" />
</head>

<body>

<header class="app-header">

  <div class="header-center">

    <h1 class="app-title">
      MYNTRA SALES & PLANNING
    </h1>

    <div class="header-right search-wrap">
      <input
        id="globalSearch"
        class="search-box"
        type="text"
        placeholder="Search Style ID"
      />
    </div>

  </div>

  <div class="header-left filters-row">

    <select
      id="monthFilter"
      class="filter-control"
    ></select>

    <input
      type="date"
      id="startDate"
      class="filter-control"
    />

    <input
      type="date"
      id="endDate"
      class="filter-control"
    />

    <select
      id="brandFilter"
      class="filter-control"
    ></select>

    <select
      id="poTypeFilter"
      class="filter-control"
    ></select>

  </div>

</header>

<nav class="tab-nav">

  <button
    class="tab-btn active"
    data-tab="dashboard"
  >
    📊 Dashboard
  </button>

  <button
    class="tab-btn"
    data-tab="sales"
  >
    💰 Sales
  </button>

  <button
    class="tab-btn"
    data-tab="sjit"
  >
    🚚 SJIT Planning
  </button>

  <button
    class="tab-btn"
    data-tab="sor"
  >
    🏬 SOR Planning
  </button>

  <button
    class="tab-btn"
    data-tab="xray"
  >
    🔍 Style X-Ray
  </button>

  <button
    class="tab-btn"
    data-tab="export"
  >
    ⬇ Export Center
  </button>

</nav>

<main class="app-main">

  <section
    id="dashboard"
    class="tab-panel active"
  ></section>

  <section
    id="sales"
    class="tab-panel"
  ></section>

  <section
    id="sjit"
    class="tab-panel"
  ></section>

  <section
    id="sor"
    class="tab-panel"
  ></section>

  <section
    id="xray"
    class="tab-panel"
  ></section>

  <section
    id="export"
    class="tab-panel"
  ></section>

</main>

<script
  type="module"
  src="js/app.js"
></script>

</body>
</html>
