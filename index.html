<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MYNTRA SALES & PLANNING</title>

  <!-- CORE CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- MODULE CSS -->
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/sales.css" />
  <link rel="stylesheet" href="css/sjit-planning.css" />
  <link rel="stylesheet" href="css/sor-planning.css" />
  <link rel="stylesheet" href="css/export-center.css" />
</head>

<body>

<!-- ======================================
HEADER
====================================== -->
<header class="app-header">

  <div class="header-center">

    <h1 class="app-title">
      MYNTRA SALES & PLANNING
    </h1>

    <div class="header-right search-wrap">
      <input
        id="globalSearch"
        class="search-box"
        type="text"
        placeholder="Search Style ID / ERP SKU"
      />
    </div>

  </div>

  <div class="header-left filters-row">

    <select
      id="monthFilter"
      class="filter-control"
    ></select>

    <input
      type="date"
      id="startDate"
      class="filter-control"
    />

    <input
      type="date"
      id="endDate"
      class="filter-control"
    />

    <select
      id="brandFilter"
      class="filter-control"
    ></select>

    <select
      id="poTypeFilter"
      class="filter-control"
    ></select>

  </div>

</header>

<!-- ======================================
NAV
====================================== -->
<nav class="tab-nav">

  <button
    class="tab-btn active"
    data-tab="dashboard"
  >
    📊 Dashboard
  </button>

  <button
    class="tab-btn"
    data-tab="sales"
  >
    💰 Sales
  </button>

  <button
    class="tab-btn"
    data-tab="sjit"
  >
    🚚 SJIT Planning
  </button>

  <button
    class="tab-btn"
    data-tab="sor"
  >
    🏬 SOR Planning
  </button>

  <button
    class="tab-btn"
    data-tab="export"
  >
    ⬇ Export Center
  </button>

</nav>

<!-- ======================================
MAIN
====================================== -->
<main class="app-main">

  <!-- DASHBOARD -->
  <section
    id="dashboard"
    class="tab-panel active"
  >

    <div class="kpi-grid">

      <div class="kpi-card">
        <span>Revenue</span>
        <strong id="kpiRevenue">-</strong>
      </div>

      <div class="kpi-card">
        <span>Units</span>
        <strong id="kpiUnits">-</strong>
      </div>

      <div class="kpi-card">
        <span>Return%</span>
        <strong id="kpiReturn">-</strong>
      </div>

      <div class="kpi-card">
        <span>SJIT Stock</span>
        <strong id="kpiSjit">-</strong>
      </div>

      <div class="kpi-card">
        <span>SOR Stock</span>
        <strong id="kpiSor">-</strong>
      </div>

      <div class="kpi-card">
        <span>Growth</span>
        <strong id="kpiGrowth">-</strong>
      </div>

    </div>

    <div
      id="dashboardDailyChart"
      class="panel-card"
    ></div>

    <div class="two-col-grid">

      <div class="panel-card">
        <h3 class="panel-title">
          Brand Performance
        </h3>
        <div id="dashboardBrandSummary"></div>
      </div>

      <div class="panel-card">
        <h3 class="panel-title">
          PO Type Analysis
        </h3>
        <div id="dashboardPoSummary"></div>
      </div>

    </div>

    <div class="two-col-grid">

      <div class="panel-card">
        <h3 class="panel-title">
          Price Range Analysis
        </h3>
        <div id="dashboardPriceRange"></div>
      </div>

      <div class="panel-card">
        <h3 class="panel-title">
          ERP Status Analysis
        </h3>
        <div id="dashboardErpStatus"></div>
      </div>

    </div>

    <div class="panel-card">
      <h3 class="panel-title">
        Stock Cover Analysis
      </h3>
      <div id="dashboardStockCover"></div>
    </div>

  </section>

  <!-- SALES -->
  <section
    id="sales"
    class="tab-panel"
  >
    <div class="panel-card">
      <h3 class="panel-title">
        Sales Master Report
      </h3>

      <div id="salesReportRoot"></div>
    </div>
  </section>

  <!-- SJIT -->
  <section
    id="sjit"
    class="tab-panel"
  ></section>

  <!-- SOR -->
  <section
    id="sor"
    class="tab-panel"
  ></section>

  <!-- EXPORT -->
  <section
    id="export"
    class="tab-panel"
  ></section>

</main>

<!-- APP -->
<script
  type="module"
  src="js/app.js"
></script>

</body>
</html>
